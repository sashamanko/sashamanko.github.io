<!DOCTYPE html>
<html lang="ua">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Генератор QR-коду</title>

    <!-- CSS
		__________________________________________________ -->
    <link rel="stylesheet" href="./assets/css/style.css">



    <!-- Google Fonts 
		__________________________________________________ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>

<body class="wrapper">
    <div class="card">
        <h1 class="card__title">Генератор QR-коду</h1>

        <hr>

        <p class="card__sub-title">Вставте URL-адресу або введіть текст, щоб створити QR-код</p>

        <form class="form">
            <input class="form__input" type="text" name="text" placeholder="Введіть текст або URL-адресу">

            <button class="form__btn" type="submit">Згенерувати QR-код</button>
        </form>

        <img class="card__img" alt="QR-код" data-visibility="false">

    </div>
</body>

<script src="./assets/js/app.js"></script>

</html>
